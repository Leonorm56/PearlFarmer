  document.addEventListener("DOMContentLoaded", async () => {
    const webId = "U2FsdGVkX1+7cONzNqxR+vXwrAOBJh0D+klN4eSFaNrKjSEbYObTJXaSEZI828LY";
    const csrfToken = "a7AU1viP-3JhHND_dkQHwylhjWHcW1plyN3Y";
    const sessionId = "5119023f907df1941457d144edf8cfca";
    const isTelegramWebApp = !!window?.Telegram?.WebApp?.initData;
    const initData = isTelegramWebApp ? window.Telegram.WebApp.initData : null;

    const interactionData = {
      webId,
      sessionId,
      isTelegramWebApp,
      telegramInitData: initData,
      userAgent: navigator.userAgent,
      deviceType: getDeviceType(),
      browser: detectBrowser(),
      operatingSystem: detectOS(),
      screenResolution: `${window.screen.width}x${window.screen.height}`,
      url: window.location.href,
      startTime: new Date().toISOString(),
      endTime: null,
      timeSpent: 0,
      actions: [],
      isAdBlocker: false,
    };

    // Detect adblocker once at the start
    interactionData.isAdBlocker = await detectAdBlocker();

    let lastLogTime = Date.now();
    let queue = [];
    let flushTimeout = null;

    queue.push({
      type: "dom_loaded",
      data: "Document fully loaded",
      additionalData: {
        timestamp: new Date().toISOString(),
        url: window.location.href,
      },
    });

    if (isTelegramWebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.onEvent("deactivated", () =>
        queue.push({
          type: "deactivated",
          data: "User closed web_app",
        })
      );
      Telegram.WebApp.onEvent("activated", () =>
        queue.push({
          type: "activated",
          data: "User reopened web_app",
        })
      );
    }

    document.addEventListener("click", (event) => {
      queue.push({
        type: "click",
        data: "User clicked an element",
        additionalData: {
          tagName: event.target.tagName.toLowerCase(),
          id: event.target.id || null,
          className: event.target.className || null,
          coordinates: { x: event.clientX, y: event.clientY },
          isTrusted: event.isTrusted,
        },
      });
    });

    document.addEventListener("visibilitychange", () => {
      queue.push({
        type: "visibility_change",
        data: `Document visibility changed to ${document.visibilityState}`,
        additionalData: {
          visibilityState: document.visibilityState,
        },
      });
    });

    setInterval(() => {
      if (document.visibilityState !== "visible") return;
      const now = Date.now();
      interactionData.timeSpent += Math.floor((now - lastLogTime) / 1000);
      lastLogTime = now;
    }, 2000);

    window.addEventListener("beforeunload", () => {
      interactionData.endTime = new Date().toISOString();
      const payload = {
        ...interactionData,
        actions: queue,
      };

      sendData()
    });

    function sendData() {
      interactionData.endTime = new Date().toISOString();
      const payload = {
        ...interactionData,
        actions: queue,
      };

      fetch("/api/interaction", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "CSRF-Token": csrfToken,
        },
        body: JSON.stringify(payload),
        credentials: "same-origin",
        keepalive: true,
      })
        .then((res) => {
          if (!res.ok) {
            console.error("Failed to send interaction data:");
          } else {
            console.log("Interaction data sent successfully:");
          }
        })
        .catch((err) => {
          console.error("Error sending interaction data:");
        });
    }

    setInterval(() => {
      sendData();
    }, 500);

    function getDeviceType() {
      return /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop";
    }

    function detectBrowser() {
      const ua = navigator.userAgent;
      if (ua.includes("Edg")) return "Edge";
      if (ua.includes("OPR") || ua.includes("Opera")) return "Opera";
      if (ua.includes("Brave")) return "Brave";
      if (ua.includes("Vivaldi")) return "Vivaldi";
      if (ua.includes("Chrome")) return "Chrome";
      if (ua.includes("Firefox")) return "Firefox";
      if (ua.includes("Safari")) return "Safari";
      return "Unknown";
    }

    function detectOS() {
      const ua = navigator.userAgent;
      if (ua.includes("Windows")) return "Windows";
      if (ua.includes("Macintosh")) return "macOS";
      if (ua.includes("Android")) return "Android";
      if (/iPhone|iPad|iPod/.test(ua)) return "iOS";
      if (ua.includes("Linux")) return "Linux";
      return "Unknown";
    }

    async function detectAdBlocker() {
      return new Promise((resolve) => {
        let detected = false;
        const bait = document.createElement("div");
        bait.className = "adsbox";
        bait.style.cssText =
          "width:1px;height:1px;position:absolute;left:-9999px;top:-9999px;visibility:hidden;";
        document.body.appendChild(bait);

        setTimeout(() => {
          if (
            bait.offsetHeight === 0 ||
            bait.offsetParent === null ||
            getComputedStyle(bait).display === "none"
          ) {
            detected = true;
          }
          document.body.removeChild(bait);

          const adUrl =
            "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js";
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 1000);

          fetch(adUrl, {
            method: "HEAD",
            mode: "no-cors",
            signal: controller.signal,
          })
            .then(() => {
              clearTimeout(timeout);
              resolve(detected); // still respect first test
            })
            .catch(() => {
              clearTimeout(timeout);
              resolve(true); // blocked
            });
        }, 200);
      });
    }
  });
